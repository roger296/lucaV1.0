name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gl_ledger_test
          POSTGRES_USER: gl_admin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U gl_admin -d gl_ledger_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://gl_admin:testpassword@localhost:5433/gl_ledger_test
      JWT_SECRET: ci-test-secret-not-for-production
      CHAIN_DIR: /tmp/test-chains

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run migrate

      - run: npm run seed

      - run: npm test
